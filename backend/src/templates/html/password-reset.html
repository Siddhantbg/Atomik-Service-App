<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password</title>
<style>
body{margin:0;padding:0;background:#111111;font-family:Arial,Helvetica,sans-serif;}
.container{max-width:620px;margin:auto;background:#1b1b1b;border-radius:16px;overflow:hidden;border:1px solid #2c2c2c;}
.header{background:#231f20;padding:40px;text-align:center;border-bottom:2px solid #ed1d24;}
.logo{font-size:34px;color:#ffffff;font-weight:bold;}
.content{padding:40px 30px;}
.title{font-size:28px;color:#ed1d24;margin-bottom:20px;}
.text{color:#d0d0d0;line-height:1.8;font-size:15px;}
.button{display:inline-block;margin-top:30px;padding:16px 32px;background:#ed1d24;border-radius:10px;text-decoration:none;color:#ffffff !important;font-weight:bold;}
.footer{padding:25px;text-align:center;background:#171717;color:#777777;font-size:12px;}
</style>
</head>
<body style="padding:20px 10px;background:#111111;">
<div class="container">
<div class="header"><div class="logo">ATOMIK</div></div>
<div class="content">
<div class="title">Reset Your Password</div>
<div class="text">We received a request to reset your Atomik account password.</div>
<a href="{{resetLink}}" class="button">RESET PASSWORD</a>
<div class="text" style="margin-top:25px;">If you didn’t request this, you can safely ignore this email.</div>
</div>
<div class="footer">© 2026 Atomik Audio Systems</div>
</div>
</body>
</html>
