<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Booking Confirmed</title>
<style>
body{margin:0;padding:0;background:#111111;font-family:Arial,Helvetica,sans-serif;}
.wrapper{width:100%;padding:20px 10px;background:#111111;}
.container{max-width:620px;margin:auto;background:#1b1b1b;border-radius:16px;overflow:hidden;border:1px solid #2c2c2c;}
.header{background:#231f20;padding:40px 20px;text-align:center;border-bottom:2px solid #ed1d24;}
.logo{font-size:34px;font-weight:700;color:#ffffff;letter-spacing:3px;}
.content{padding:40px 30px;}
.title{font-size:28px;color:#ed1d24;margin-bottom:20px;}
.text{font-size:15px;line-height:1.8;color:#d0d0d0;}
.card{background:#262626;border:1px solid #333333;border-radius:12px;padding:22px;margin-top:28px;}
.label{font-size:11px;color:#a09f9f;letter-spacing:1px;}
.value{font-size:17px;color:#ffffff;margin-top:6px;margin-bottom:18px;}
.button{display:inline-block;margin-top:30px;background:#ed1d24;padding:16px 32px;border-radius:10px;text-decoration:none;color:#ffffff !important;font-weight:700;}
.footer{padding:25px;text-align:center;background:#171717;border-top:1px solid #2a2a2a;font-size:12px;color:#777777;}
@media screen and (max-width:600px){
.content{padding:28px 20px !important;}
.title{font-size:24px !important;}
.logo{font-size:28px !important;}
.button{width:100%;box-sizing:border-box;text-align:center;}
}
</style>
</head>
<body>
<div class="wrapper">
<div class="container">
<div class="header"><div class="logo">ATOMIK</div></div>
<div class="content">
<div class="title">Booking Confirmed</div>
<div class="text">Your service request has been successfully confirmed.</div>
<div class="card">
<div class="label">BOOKING ID</div>
<div class="value">{{bookingId}}</div>
<div class="label">SERVICE</div>
<div class="value">{{serviceName}}</div>
<div class="label">DATE &amp; TIME</div>
<div class="value">{{bookingDate}} | {{bookingTime}}</div>
<div class="label">VENUE</div>
<div class="value">{{venue}}</div>
<div class="label">STATUS</div>
<div class="value" style="color:#ed1d24;font-weight:bold;">{{status}}</div>
</div>
<a href="{{trackingLink}}" class="button">TRACK SERVICE</a>
</div>
<div class="footer">© 2026 Atomik Audio Systems</div>
</div>
</div>
</body>
</html>
