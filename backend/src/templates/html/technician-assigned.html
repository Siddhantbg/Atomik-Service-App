<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Technician Assigned</title>
<style>
body{margin:0;padding:0;background:#111111;font-family:Arial,Helvetica,sans-serif;}
.container{max-width:620px;margin:auto;background:#1b1b1b;border-radius:16px;overflow:hidden;border:1px solid #2c2c2c;}
.header{padding:40px;background:#231f20;text-align:center;border-bottom:2px solid #ed1d24;}
.logo{font-size:34px;font-weight:bold;color:#ffffff;}
.content{padding:40px 30px;}
.title{font-size:28px;color:#ed1d24;margin-bottom:20px;}
.card{background:#262626;border-radius:12px;padding:22px;border:1px solid #333333;margin-top:25px;}
.label{font-size:11px;color:#a09f9f;}
.value{font-size:17px;color:#ffffff;margin-top:5px;margin-bottom:18px;}
.button{display:inline-block;margin-top:30px;background:#ed1d24;padding:16px 32px;border-radius:10px;text-decoration:none;color:#ffffff !important;font-weight:700;}
.footer{padding:25px;text-align:center;background:#171717;font-size:12px;color:#777777;}
</style>
</head>
<body style="padding:20px 10px;background:#111111;">
<div class="container">
<div class="header"><div class="logo">ATOMIK</div></div>
<div class="content">
<div class="title">Technician Assigned</div>
<div style="color:#d0d0d0;line-height:1.8;">A technician has been assigned to your booking.</div>
<div class="card">
<div class="label">TECHNICIAN NAME</div>
<div class="value">{{technicianName}}</div>
<div class="label">CONTACT</div>
<div class="value">{{technicianPhone}}</div>
<div class="label">ESTIMATED ARRIVAL</div>
<div class="value">{{eta}}</div>
</div>
<a href="{{trackingLink}}" class="button">TRACK SERVICE</a>
</div>
<div class="footer">© 2026 Atomik Audio Systems</div>
</div>
</body>
</html>
